<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freelancer Rate Calculator</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">
    <h1>Freelancer Rate Calculator</h1>
    <div class="cards">
      <section class="card">
        <h2>Day Rate</h2>
        <label>Rate per hour (€)</label>
        <input id="ratePerHour" type="number" />

        <button onclick="calculateDayRate()">Calculate</button>
        <p class="result" id="dayRateResult"></p>
      </section>

      <section class="card">
        <h2>Days in Budget</h2>
        <label>Budget (€)</label>
        <input id="budget" type="number" />

        <label>Rate per hour (€)</label>
        <input id="budgetRate" type="number" />

        <button onclick="calculateDaysInBudget()">Calculate</button>
        <p class="result" id="daysBudgetResult"></p>
      </section>

      <section class="card">
        <h2>Price With Monthly Discount</h2>
        <label>Rate per hour (€)</label>
        <input id="discountRate" type="number" />

        <label>Number of days</label>
        <input id="numDays" type="number" />

        <label>Discount (0–1)</label>
        <input id="discount" type="number" step="0.01" />

        <button onclick="calculateDiscountPrice()">Calculate</button>
        <p class="result" id="discountResult"></p>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
  

</body>
</html>
